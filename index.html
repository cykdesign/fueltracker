<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://kqmsjolekyivtqszqbvu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxbXNqb2xla3lpdnRxc3pxYnZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTUwNTUsImV4cCI6MjA5Njc5MTA1NX0.qTkBhdGMyO4maejF4EagwZg7PH0JMGSZhuFFYeuh6Lc';
let currentUser = null;

function authHeaders(extra={}) {
  const token = currentUser?.access_token || SUPA_KEY;
  return { 'Content-Type':'application/json', 'apikey':SUPA_KEY, 'Authorization':'Bearer '+token, ...extra };
}

async function dbFetch(path, opts={}) {
  const res = await fetch(SUPA_URL+'/rest/v1/'+path, { headers: authHeaders(), ...opts });
  if (!res.ok) throw new Error(await res.text());
  return res.status===204 ? null : res.json();
}

async function authFetch(path, body) {
  const res = await fetch(SUPA_URL+'/auth/v1/'+path, { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPA_KEY}, body:JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description||data.msg||'Auth error');
  return data;
}

// ── auth ──────────────────────────────────────────────────────────────────────
async function signUp(email, password) {
  const data = await authFetch('signup', {email, password});
  currentUser = data; localStorage.setItem('gas_user', JSON.stringify(data));
  showApp(); await loadAll();
}
async function signIn(email, password) {
  const data = await authFetch('token?grant_type=password', {email, password});
  currentUser = data; localStorage.setItem('gas_user', JSON.stringify(data));
  showApp(); await loadAll();
}
function signOut() {
  currentUser=null; entries=[]; cars=[]; selectedCarId='all';
  localStorage.removeItem('gas_user'); localStorage.removeItem('gas_tracker_entries'); localStorage.removeItem('gas_tracker_cars');
  showAuth('login');
}
function confirmSignOut() { if (confirm(`Sign out of ${currentUser?.user?.email}?`)) signOut(); }

function showApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-email').textContent = currentUser?.user?.email||'';
  switchView('dashboard'); updateHeader();
}
function showAuth(mode='login') {
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  renderAuth(mode);
}
function renderAuth(mode) {
  const isLogin = mode==='login';
  document.getElementById('auth-screen').innerHTML = `
    <div style="width:100%;max-width:380px;padding:32px 24px">
      <div style="text-align:center;margin-bottom:40px">
        <div style="width:72px;height:72px;border-radius:18px;margin:0 auto 16px;overflow:hidden;flex-shrink:0"><svg width="72" height="72" viewBox="0 0 535 535" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="535" height="535" rx="16" fill="#FFF7EE"/><path d="M177.168 196.882C176.015 201.844 171.067 204.929 166.116 203.773L146.118 199.105C141.167 197.949 138.089 192.99 139.242 188.028L158.678 104.403C159.831 99.4414 164.779 96.3559 169.73 97.5118L189.727 102.18C194.678 103.336 197.757 108.296 196.604 113.257L177.168 196.882Z" fill="url(#lg1)"/><path fill-rule="evenodd" clip-rule="evenodd" d="M213.535 101.163C214.671 96.2051 219.597 93.1037 224.547 94.2315L287.392 108.556C292.349 109.686 295.453 114.63 294.326 119.597L248.496 321.562C244.264 340.213 258.408 357.975 277.493 357.975H387.796C392.879 357.975 397 362.106 397 367.2V431.775C397 436.87 392.879 441 387.796 441H194.858L189.868 440.964C189.292 440.988 188.714 441 188.132 441C165.061 441 146.358 422.255 146.358 399.133C146.358 395.43 146.839 391.84 147.739 388.42C147.735 388.437 147.73 388.454 147.725 388.471L213.535 101.163Z" fill="url(#lg2)"/><defs><linearGradient id="lg1" x1="156.979" y1="108.547" x2="397.704" y2="440.489" gradientUnits="userSpaceOnUse"><stop stop-color="#FA9393"/><stop offset="1" stop-color="#ECC381"/></linearGradient><linearGradient id="lg2" x1="156.979" y1="108.547" x2="397.704" y2="440.489" gradientUnits="userSpaceOnUse"><stop stop-color="#FA9393"/><stop offset="1" stop-color="#ECC381"/></linearGradient></defs></svg></div>
        <h1 style="font-size:22px;font-weight:600;color:#e8eaf6;margin-bottom:4px">Loggy</h1>
        <p style="font-size:13px;color:#565a72">${isLogin?'Sign in to your account':'Create your account'}</p>
      </div>
      <div id="auth-error" style="display:none;background:#130909;border:1px solid #7f1d1d;border-radius:8px;padding:10px 12px;margin-bottom:16px;color:#f87171;font-size:13px"></div>
      <div class="field"><div class="field-label">Email</div><input class="field-input" type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="field"><div class="field-label">Password</div><input class="field-input" type="password" id="auth-password" placeholder="••••••••" autocomplete="${isLogin?'current-password':'new-password'}"/></div>
      <button class="primary-btn" id="auth-submit" onclick="handleAuth('${mode}')" style="margin-top:8px">${isLogin?'Sign In':'Create Account'}</button>
      <p style="text-align:center;font-size:13px;color:#565a72;margin-top:16px">
        ${isLogin?`Don't have an account? <a href="#" onclick="renderAuth('signup');return false" style="color:#60a5fa;text-decoration:none">Sign up</a>`:`Already have an account? <a href="#" onclick="renderAuth('login');return false" style="color:#60a5fa;text-decoration:none">Sign in</a>`}
      </p>
    </div>`;
  setTimeout(()=>{ document.getElementById('auth-password')?.addEventListener('keydown', e=>{ if(e.key==='Enter') handleAuth(mode); }); },50);
}
async function handleAuth(mode) {
  const email = document.getElementById('auth-email')?.value?.trim();
  const password = document.getElementById('auth-password')?.value;
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit');
  if (!email||!password) { errEl.textContent='Please fill in all fields.'; errEl.style.display='block'; return; }
  btn.textContent='Please wait…'; btn.disabled=true;
  try { if(mode==='login') await signIn(email,password); else await signUp(email,password); }
  catch(e) { errEl.textContent=e.message; errEl.style.display='block'; btn.textContent=mode==='login'?'Sign In':'Create Account'; btn.disabled=false; }
}

// ── state ─────────────────────────────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('gas_tracker_entries')||'[]');
let cars = JSON.parse(localStorage.getItem('gas_tracker_cars')||'[]');
let selectedCarId = 'all';
let currentView = 'dashboard';
let expandedId = null;
let deleteConfirmId = null;
let formErrors = {};
let formData = { date: todayStr() };
let syncStatus = 'idle';
let stationSearchTimer = null;

const CAR_COLORS = ['#f87171','#fb923c','#fbbf24','#34d399','#60a5fa','#a78bfa','#f472b6','#94a3b8'];

// ── helpers ───────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmt(n,d=2) { return Number(n).toFixed(d); }
function fmtDate(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtShort(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtMonth(s) { return new Date(s+'-01T00:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function saveEntries() { localStorage.setItem('gas_tracker_entries', JSON.stringify(entries)); }
function saveCars() { localStorage.setItem('gas_tracker_cars', JSON.stringify(cars)); }
function getCarName(id) { const c=cars.find(c=>c.id===id); return c ? (c.nickname||`${c.year} ${c.make} ${c.model}`) : 'Unknown Car'; }
function getCarColor(id) { const c=cars.find(c=>c.id===id); return c?.color||'#60a5fa'; }

function filteredEntries() {
  if (selectedCarId==='all') return [...entries].sort((a,b)=>a.date.localeCompare(b.date));
  return entries.filter(e=>e.carId===selectedCarId).sort((a,b)=>a.date.localeCompare(b.date));
}

function withMpg(list) {
  return list.map((e,i)=>{
    const prev=list[i-1];
    let mpg=null;
    if(prev&&e.odometer&&prev.odometer&&e.odometer>prev.odometer) mpg=(e.odometer-prev.odometer)/+e.gallons;
    else if(e.milesDriven&&+e.milesDriven>0) mpg=+e.milesDriven/+e.gallons;
    return {...e, mpg: mpg?+fmt(mpg,1):null};
  });
}

function computeStats(list) {
  if(!list.length) return null;
  const cd=withMpg(list);
  const totalSpent=list.reduce((s,e)=>s+ +e.totalCost,0);
  const totalGallons=list.reduce((s,e)=>s+ +e.gallons,0);
  const avgPrice=totalSpent/totalGallons;
  const mpgEntries=cd.filter(e=>e.mpg);
  const avgMpg=mpgEntries.length?mpgEntries.reduce((s,e)=>s+e.mpg,0)/mpgEntries.length:null;
  const avgFillup=totalSpent/list.length;
  const cpmEntries=cd.filter(e=>e.mpg&&e.pricePerGallon);
  const avgCpm=cpmEntries.length?cpmEntries.reduce((s,e)=>s+(+e.pricePerGallon/e.mpg),0)/cpmEntries.length:null;
  const prices=list.map(e=>+e.pricePerGallon);
  const bestPrice=Math.min(...prices), worstPrice=Math.max(...prices);
  let maxGap=null;
  for(let i=1;i<list.length;i++){
    const gap=Math.round((new Date(list[i].date+'T00:00:00')-new Date(list[i-1].date+'T00:00:00'))/(86400000));
    if(maxGap===null||gap>maxGap) maxGap=gap;
  }
  const stationMap={};
  list.forEach(e=>{if(e.station) stationMap[e.station]=(stationMap[e.station]||0)+1;});
  const topStation=Object.keys(stationMap).sort((a,b)=>stationMap[b]-stationMap[a])[0]||null;
  const monthMap={};
  list.forEach(e=>{
    const mo=e.date.slice(0,7);
    if(!monthMap[mo]) monthMap[mo]={spent:0,gallons:0,fillUps:0};
    monthMap[mo].spent+=+e.totalCost; monthMap[mo].gallons+=+e.gallons; monthMap[mo].fillUps++;
  });
  const months=Object.keys(monthMap).sort();
  const thisYear=new Date().getFullYear().toString();
  const ytd=list.filter(e=>e.date.startsWith(thisYear)).reduce((s,e)=>s+ +e.totalCost,0);
  const thisMo=todayStr().slice(0,7);
  const thisMonthSpend=monthMap[thisMo]?.spent||0, thisMonthFillups=monthMap[thisMo]?.fillUps||0;
  let avgGap=null;
  if(list.length>=2){
    const d1=new Date(list[0].date+'T00:00:00'), d2=new Date(list[list.length-1].date+'T00:00:00');
    avgGap=Math.round((d2-d1)/86400000/(list.length-1));
  }
  return {totalSpent,totalGallons,avgPrice,avgMpg,avgFillup,avgCpm,bestPrice,worstPrice,maxGap,topStation,months,monthMap,ytd,thisMonthSpend,thisMonthFillups,avgGap,fillUps:list.length,chartData:cd};
}

// ── sync status ───────────────────────────────────────────────────────────────
function setSyncStatus(s) {
  syncStatus=s;
  const el=document.getElementById('sync-status'); if(!el) return;
  const map={syncing:'⟳ Syncing…',ok:'✓ Synced',error:'⚠ Sync failed',idle:''};
  const col={syncing:'#60a5fa',ok:'#34d399',error:'#f87171',idle:'#3a3d52'};
  el.textContent=map[s]||''; el.style.color=col[s]||'#3a3d52';
}

// ── Supabase ops ──────────────────────────────────────────────────────────────
async function loadAll() {
  setSyncStatus('syncing');
  try {
    // load cars
    const carRows = await dbFetch('cars?select=*&order=created_at.asc');
    cars = carRows.map(r=>({id:r.id,make:r.make,model:r.model,year:r.year,nickname:r.nickname,color:r.color}));
    saveCars();
    // load fillups
    const rows = await dbFetch('fillups?select=*&order=date.asc');
    entries = rows.map(r=>({
      id:r.id,date:r.date,gallons:+r.gallons,pricePerGallon:+r.price_per_gallon,
      totalCost:+r.total_cost,station:r.station,grade:r.grade,paymentMethod:r.payment_method,
      odometer:r.odometer?+r.odometer:null,milesDriven:r.miles_driven?+r.miles_driven:null,
      carId:r.car_id||null,
    }));
    saveEntries();
    setSyncStatus('ok');
    updateHeader();
    if(currentView==='dashboard') renderDashboard();
    else if(currentView==='log') renderLog();
    else if(currentView==='garage') renderGarage();
  } catch(e) { console.error(e); setSyncStatus('error'); }
}

async function pushFillup(entry) {
  setSyncStatus('syncing');
  try {
    await dbFetch('fillups', { method:'POST', headers:authHeaders({'Prefer':'resolution=merge-duplicates'}),
      body: JSON.stringify({id:entry.id,date:entry.date,gallons:entry.gallons,price_per_gallon:entry.pricePerGallon,
        total_cost:entry.totalCost,station:entry.station||null,grade:entry.grade||null,
        payment_method:entry.paymentMethod||null,odometer:entry.odometer||null,
        miles_driven:entry.milesDriven||null,user_id:currentUser?.user?.id||null,car_id:entry.carId||null}) });
    setSyncStatus('ok');
  } catch(e) { console.error(e); setSyncStatus('error'); }
}

async function deleteFillup(id) {
  try { await dbFetch(`fillups?id=eq.${id}`,{method:'DELETE'}); } catch(e){console.error(e);}
}

async function pushCar(car) {
  setSyncStatus('syncing');
  try {
    await dbFetch('cars', { method:'POST', headers:authHeaders({'Prefer':'resolution=merge-duplicates'}),
      body: JSON.stringify({id:car.id,make:car.make,model:car.model,year:car.year||null,
        nickname:car.nickname||null,color:car.color||'#60a5fa',user_id:currentUser?.user?.id||null}) });
    setSyncStatus('ok');
  } catch(e) { console.error(e); setSyncStatus('error'); }
}

async function deleteCar(id) {
  try { await dbFetch(`cars?id=eq.${id}`,{method:'DELETE'}); } catch(e){console.error(e);}
}

// ── routing ───────────────────────────────────────────────────────────────────
function switchView(v) {
  currentView=v;
  ['dashboard','log','add','garage'].forEach(n=>{
    document.getElementById('view-'+n).style.display=n===v?'block':'none';
    document.querySelector(`[data-view="${n}"]`)?.classList.toggle('active',n===v);
  });
  if(v==='dashboard') renderDashboard();
  else if(v==='log') renderLog();
  else if(v==='add') renderAdd();
  else if(v==='garage') renderGarage();
  updateHeader();
}

function updateHeader() {
  document.getElementById('log-label').textContent=entries.length?`Log (${entries.length})`:'Log';
  document.getElementById('persist-banner').style.display=entries.length?'block':'none';
}

// ── car filter tabs ───────────────────────────────────────────────────────────
function carTabsHTML() {
  if(!cars.length) return '';
  const tabs=[{id:'all',label:'All Cars',color:'#6b6f8a'},...cars.map(c=>({id:c.id,label:c.nickname||`${c.year||''} ${c.make}`.trim(),color:c.color||'#60a5fa'}))];
  return `<div class="car-tabs">${tabs.map(t=>`
    <button class="car-tab ${selectedCarId===t.id?'active':''}" onclick="selectCar('${t.id}')">
      ${t.id!=='all'?`<span class="car-color-dot" style="background:${t.color}"></span>`:''}${t.label}
    </button>`).join('')}</div>`;
}

function selectCar(id) { selectedCarId=id; if(currentView==='dashboard') renderDashboard(); else renderLog(); }

      <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value" style="color:#60a5fa">$${fmt(s.thisMonthSpend)}</div><div class="stat-sub">${s.thisMonthFillups} fill-up${s.thisMonthFillups!==1?'s':''}</div></div>

      ${s.avgMpg?`<div class="stat-card"><div class="stat-label">Avg MPG</div><div class="stat-value">${fmt(s.avgMpg,1)}</div></div>`:''}
      ${s.avgCpm?`<div class="stat-card"><div class="stat-label">Cost/Mile</div><div class="stat-value">$${fmt(s.avgCpm,3)}</div></div>`:''}

    ${s.chartData.some(d=>d.mpg)?`<div class="card"><div class="card-title">Fuel Economy (MPG)</div><canvas id="chart-mpg"></canvas></div>`:`<div class="card" style="text-align:center;color:#3a3d52;font-size:13px;padding:20px">Add odometer or miles driven to enable MPG chart.</div>`}

    new Chart(document.getElementById('chart-spend'),{type:'bar',data:{labels,datasets:[{data:cd.map(e=>e.totalCost),backgroundColor:'#818cf8',borderRadius:4}]},options:{...chartOpts,scales:{...chartOpts.scales,y:yDollar}}});
    const moLabels=s.months.map(m=>new Date(m+'-01T00:00:00').toLocaleDateString('en-US',{month:'short',year:'2-digit'}));
    new Chart(document.getElementById('chart-monthly'),{type:'bar',data:{labels:moLabels,datasets:[{data:s.months.map(m=>+fmt(s.monthMap[m].spent)),backgroundColor:'#34d399',borderRadius:4}]},options:{...chartOpts,scales:{...chartOpts.scales,y:yDollar}}});

// ── log ───────────────────────────────────────────────────────────────────────
function renderLog() {
  const el=document.getElementById('view-log');
  const list=[...filteredEntries()].reverse();
  const cd=withMpg(filteredEntries());
  if(!list.length){
    el.innerHTML=`${carTabsHTML()}<div class="empty"><div class="empty-icon">📋</div><p style="font-size:14px;margin-bottom:20px">No fill-ups yet.</p><button class="primary-btn" style="max-width:200px;margin:0 auto" onclick="switchView('add')">+ Log a Fill-up</button></div>`;
    return;
  }
  el.innerHTML=`
    ${carTabsHTML()}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <p style="color:#3a3d52;font-size:12px">${list.length} fill-up${list.length!==1?'s':''} · tap to expand</p>
      <button class="green-btn" onclick="exportCSV()">⬇ CSV</button>
    </div>
    ${list.map(e=>{
      const cdEntry=cd.find(d=>d.id===e.id);
      const isOpen=expandedId===e.id, isDel=deleteConfirmId===e.id;
      const car=cars.find(c=>c.id===e.carId);
      const details=[
        ['Date',fmtDate(e.date)],['Gallons',`${e.gallons} gal`],
        ['Price/gal',`$${fmt(e.pricePerGallon)}`],['Total',`$${fmt(e.totalCost)}`],
        e.station&&['Station',e.station], e.grade&&['Grade',e.grade],
        e.paymentMethod&&['Payment',e.paymentMethod],
        e.odometer&&['Odometer',`${Number(e.odometer).toLocaleString()} mi`],
        e.milesDriven&&['Miles driven',`${e.milesDriven} mi`],
        cdEntry?.mpg&&['MPG',`${fmt(cdEntry.mpg,1)} mpg`],
        cdEntry?.mpg&&e.pricePerGallon&&['Cost/mile',`$${fmt(+e.pricePerGallon/cdEntry.mpg,3)}`],
        car&&['Car',car.nickname||`${car.year||''} ${car.make} ${car.model}`.trim()],
      ].filter(Boolean);
      return `<div class="entry-card ${isOpen?'open':''}" id="entry-${e.id}">
        <div class="entry-row" onclick="toggleEntry(${e.id})">
          <div>
            <div style="font-size:13px;font-weight:600;color:#c7cae0;margin-bottom:3px">${fmtShort(e.date)}${car?`<span style="margin-left:8px;font-size:10px;background:${car.color||'#60a5fa'}22;color:${car.color||'#60a5fa'};padding:2px 7px;border-radius:10px">${car.nickname||car.make}</span>`:''}</div>
            <div style="font-size:11px;color:#565a72">${e.gallons} gal${e.station?' · '+e.station:''}${e.grade?' · '+e.grade:''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <div style="text-align:right">
              <div style="font-size:15px;font-weight:700;color:#34d399;font-family:'DM Mono',monospace">$${fmt(e.totalCost)}</div>
              <div style="font-size:11px;color:#565a72">$${fmt(e.pricePerGallon)}/gal</div>
            </div>
            <span style="color:#3a3d52;font-size:12px">${isOpen?'▲':'▼'}</span>
          </div>
        </div>
        <div class="entry-detail ${isOpen?'open':''}">
          <div class="detail-grid">${details.map(([k,v])=>`<div><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`).join('')}</div>
          ${isDel?`<div style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:#f87171;flex:1">Delete this fill-up?</span><button class="delete-btn" onclick="confirmDelete(${e.id})">Delete</button><button class="ghost-btn" onclick="deleteConfirmId=null;renderLog()">Cancel</button></div>`:`<button class="ghost-btn" onclick="startDelete(${e.id})">🗑 Delete</button>`}
        </div>
      </div>`;
    }).join('')}`;
}

function toggleEntry(id){expandedId=expandedId===id?null:id;deleteConfirmId=null;renderLog();}
function startDelete(id){deleteConfirmId=id;renderLog();}
function confirmDelete(id){entries=entries.filter(e=>e.id!==id);saveEntries();deleteFillup(id);expandedId=null;deleteConfirmId=null;renderLog();updateHeader();}

function exportCSV(){
  const cd=withMpg(filteredEntries());
  const headers=['Date','Car','Gallons','Price/Gal','Total Cost','Station','Grade','Payment','Odometer','Miles Driven','MPG','Cost/Mile'];
  const rows=cd.map(e=>[e.date,getCarName(e.carId),e.gallons,e.pricePerGallon,e.totalCost,e.station||'',e.grade||'',e.paymentMethod||'',e.odometer||'',e.milesDriven||'',e.mpg||'',(e.mpg&&e.pricePerGallon)?fmt(+e.pricePerGallon/e.mpg,4):'']);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`gas-tracker-${todayStr()}.csv`; a.click();
}

function deleteCarPrompt(id){
  const car=cars.find(c=>c.id===id);
  const count=entries.filter(e=>e.carId===id).length;
  if(confirm(`Delete "${car?.nickname||car?.make}"? ${count} fill-up${count!==1?'s':''} will be unassigned.`)){
    cars=cars.filter(c=>c.id!==id); saveCars(); deleteCar(id); renderGarage();
  }
}

// ── car modal ─────────────────────────────────────────────────────────────────
function openCarModal(editId=null) {
  const car = editId ? cars.find(c=>c.id===editId) : null;
  const selectedColor = car?.color || CAR_COLORS[0];
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">${car?'Edit Car':'Add a Car'}</div>
        <div class="field"><div class="field-label">Nickname <span style="color:#3a3d52;font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">— optional, e.g. "Daily Driver"</span></div><input class="field-input" id="car-nickname" value="${car?.nickname||''}" placeholder="e.g. Daily Driver"/></div>
        <div class="field"><div class="field-label">Make <span style="color:#f87171">*</span></div><input class="field-input" id="car-make" value="${car?.make||''}" placeholder="e.g. Toyota"/></div>
        <div class="field"><div class="field-label">Model <span style="color:#f87171">*</span></div><input class="field-input" id="car-model" value="${car?.model||''}" placeholder="e.g. Camry"/></div>
        <div class="field"><div class="field-label">Year</div><input class="field-input" id="car-year" type="number" value="${car?.year||''}" placeholder="e.g. 2022" min="1980" max="2030"/></div>
        <div class="field">
          <div class="field-label">Color</div>
          <div class="color-picker" id="color-picker">
            ${CAR_COLORS.map(c=>`<div class="color-swatch ${c===selectedColor?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${c}')"></div>`).join('')}
          </div>
        </div>
        <button class="primary-btn" onclick="saveCar('${editId||''}')">Save Car</button>
        <button class="ghost-btn" style="width:100%;text-align:center" onclick="closeModal()">Cancel</button>
      </div>
    </div>`;
}

function selectColor(color) {
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('selected',s.dataset.color===color));
}

function closeModal() { document.getElementById('modal-root').innerHTML=''; }

async function saveCar(editId) {
  const make=document.getElementById('car-make').value.trim();
  const model=document.getElementById('car-model').value.trim();
  if(!make||!model){ alert('Make and model are required.'); return; }
  const color=document.querySelector('.color-swatch.selected')?.dataset.color||CAR_COLORS[0];
  const car={
    id: editId||Date.now().toString(),
    make, model,
    year: document.getElementById('car-year').value||null,
    nickname: document.getElementById('car-nickname').value.trim()||null,
    color,
  };
  if(editId) cars=cars.map(c=>c.id===editId?car:c);
  else cars.push(car);
  saveCars(); await pushCar(car); closeModal(); renderGarage();
}

    <div class="total-preview">
      <span style="font-size:11px;color:#565a72;text-transform:uppercase;letter-spacing:0.06em">Total</span>
      <span class="preview-amt" style="color:${total==='—'?'#3a3d52':'#34d399'}">${total}</span>
    </div>
    <button class="primary-btn" onclick="handleSave()">Save Fill-up</button>
  `;

  // attach input listeners
  el.querySelectorAll('[data-field]').forEach(input=>{
    input.addEventListener('input',e=>{
      formData[e.target.dataset.field]=e.target.value;
      formErrors[e.target.dataset.field]=null;
      if(['gallons','pricePerGallon'].includes(e.target.dataset.field)){
        const t=formData.gallons&&formData.pricePerGallon&&+formData.gallons>0&&+formData.pricePerGallon>0?`$${fmt(+formData.gallons * +formData.pricePerGallon)}`:'—';
        const a=el.querySelector('.preview-amt'); if(a){a.textContent=t;a.style.color=t==='—'?'#3a3d52':'#34d399';}
      }
      // station search
      if(e.target.dataset.field==='station') triggerStationSearch(e.target.value);
    });
    input.addEventListener('change',e=>{ formData[e.target.dataset.field]=e.target.value; });
  });
}

function carSelectField() {
  if(!cars.length) return `<div class="field"><div class="field-label" style="color:#3a3d52">Car — <a href="#" onclick="switchView('garage');return false" style="color:#60a5fa;text-decoration:none;font-size:10px">add one in Garage</a></div></div>`;
  const val=formData.carId||'';
  return `<div class="field"><div class="field-label">Car</div><select class="field-input" data-field="carId"><option value="">No car selected</option>${cars.map(c=>`<option value="${c.id}" ${val===c.id?'selected':''}>${c.nickname||`${c.year||''} ${c.make} ${c.model}`.trim()}</option>`).join('')}</select></div>`;
}

function stationField() {
  const val=formData.station||'', err=formErrors.station||'';
  return `<div class="field" style="position:relative">
    <div class="field-label">Station <span style="color:#3a3d52;text-transform:none;letter-spacing:0;font-size:10px">— type to search</span></div>
    <input class="field-input ${err?'error':''}" type="text" data-field="station" value="${val}" placeholder="e.g. Costco Lakewood" autocomplete="off" id="station-input"/>
    <div id="station-suggestions" class="autocomplete-list" style="display:none"></div>
    ${err?`<div class="field-error">${err}</div>`:''}
  </div>`;
}

function field(key,label,required,type,placeholder='',hint=''){
  const val=formData[key]||'',err=formErrors[key]||'';
  return `<div class="field"><div class="field-label"><span>${label}${required?' <span style="color:#f87171">*</span>':''}</span>${hint?`<span class="field-hint">${hint}</span>`:''}</div><input class="field-input ${err?'error':''}" type="${type}" data-field="${key}" value="${val}" placeholder="${placeholder}" ${type==='number'?'step="0.001" min="0"':''}/>${err?`<div class="field-error">${err}</div>`:''}</div>`;
}

function selectField(key,label,options){
  const val=formData[key]||'';
  return `<div class="field"><div class="field-label"><span>${label}</span></div><select class="field-input" data-field="${key}"><option value="">Select…</option>${options.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
}

// ── station autocomplete (OpenStreetMap Nominatim) ────────────────────────────
function triggerStationSearch(query) {
  clearTimeout(stationSearchTimer);
  const box=document.getElementById('station-suggestions');
  if(!box) return;
  if(!query||query.length<3){box.style.display='none';return;}
  stationSearchTimer=setTimeout(()=>searchStations(query),400);
}

async function searchStations(query) {
  const box=document.getElementById('station-suggestions');
  if(!box) return;
  box.style.display='block';
  box.innerHTML=`<div class="autocomplete-item" style="color:#565a72">Searching…</div>`;
  try {
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+' gas station fuel')}&format=json&limit=5&addressdetails=1&accept-language=en`;
    const res=await fetch(url,{headers:{'User-Agent':'GasTrackerPWA/1.0'}});
    const data=await res.json();
    if(!data.length){
      // also try without "gas station"
      const url2=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1&accept-language=en`;
      const res2=await fetch(url2,{headers:{'User-Agent':'GasTrackerPWA/1.0'}});
      const data2=await res2.json();
      renderSuggestions(data2, query);
    } else {
      renderSuggestions(data, query);
    }
  } catch(e) {
    box.innerHTML=`<div class="autocomplete-item" style="color:#565a72">Search unavailable — type manually</div>`;
    setTimeout(()=>{ if(box) box.style.display='none'; },2000);
  }
}

function renderSuggestions(data, query) {
  const box=document.getElementById('station-suggestions');
  if(!box) return;
  if(!data.length){
    box.innerHTML=`<div class="autocomplete-item" style="color:#565a72">No results — try "Costco Lakewood CA"</div>`;
    return;
  }
  box.innerHTML=data.map((r,i)=>{
    const name=r.namedetails?.name||r.display_name.split(',')[0];
    const addr=r.display_name.split(',').slice(1,3).join(',').trim();
    return `<div class="autocomplete-item" onclick="pickStation('${name.replace(/'/g,"\\'")}','${addr.replace(/'/g,"\\'")}')">
      <div>${name}</div>
      <div class="autocomplete-sub">${addr}</div>
    </div>`;
  }).join('');
}

function pickStation(name, addr) {
  formData.station=name;
  const input=document.getElementById('station-input');
  if(input) input.value=name;
  const box=document.getElementById('station-suggestions');
  if(box) box.style.display='none';
}

// close suggestions when clicking outside
document.addEventListener('click',e=>{ if(!e.target.closest('#station-input')&&!e.target.closest('#station-suggestions')){ const b=document.getElementById('station-suggestions'); if(b) b.style.display='none'; } });

// ── save fill-up ──────────────────────────────────────────────────────────────
function handleSave(){
  formErrors={};
  if(!formData.date) formErrors.date='Required';
  if(!formData.gallons||+formData.gallons<=0) formErrors.gallons='Must be > 0';
  if(!formData.pricePerGallon||+formData.pricePerGallon<=0) formErrors.pricePerGallon='Must be > 0';
  if(formData.odometer&&+formData.odometer<=0) formErrors.odometer='Must be > 0';
  if(formData.milesDriven&&+formData.milesDriven<=0) formErrors.milesDriven='Must be > 0';
  if(formData.odometer&&entries.length){
    const carEntries=formData.carId?entries.filter(e=>e.carId===formData.carId):entries;
    const lastOdo=[...carEntries].reverse().find(e=>e.odometer)?.odometer;
    if(lastOdo&&+formData.odometer<lastOdo) formErrors.odometer=`Lower than last reading (${Number(lastOdo).toLocaleString()} mi)`;
  }
  if(Object.keys(formErrors).length){renderAdd();return;}
  const totalCost=formData.totalCost&&+formData.totalCost>0?+formData.totalCost:+(+formData.gallons * +formData.pricePerGallon).toFixed(2);
  const entry={...formData,id:Date.now(),totalCost,gallons:+formData.gallons,pricePerGallon:+formData.pricePerGallon,odometer:formData.odometer?+formData.odometer:null,milesDriven:formData.milesDriven?+formData.milesDriven:null,carId:formData.carId||null};
  entries.push(entry); saveEntries(); pushFillup(entry);
  formData={date:todayStr(),carId:formData.carId}; // keep car selection
  formErrors={};
  updateHeader(); switchView('log');
}

async function handleFile(input){
  const file=input.files?.[0]; if(!file) return; input.value='';
}

// ── init ──────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

const savedUser=localStorage.getItem('gas_user');
if(savedUser){
  try{ currentUser=JSON.parse(savedUser); showApp(); loadAll(); }
  catch(e){ showAuth('login'); }
} else { showAuth('login'); }
</script>
